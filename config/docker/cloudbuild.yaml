steps:
  # Pull previous image for layer cache (ignore failure on first build).
  - name: "gcr.io/cloud-builders/docker"
    id: pull-cache
    entrypoint: bash
    args: ["-c", "docker pull $_IMAGE || exit 0"]

  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - --cache-from=$_IMAGE
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - -t
      - $_IMAGE
      - -f
      - config/docker/backend.prod.Dockerfile
      - .
    env: ["DOCKER_BUILDKIT=1"]

  - name: "gcr.io/cloud-builders/docker"
    id: push
    args: [push, $_IMAGE]

  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy
    args:
      - run
      - deploy
      - propos-api
      - --image=$_IMAGE
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --min-instances=0
      - --max-instances=1
      - --memory=512Mi
      - --cpu=1
      - --env-vars-file=config/docker/cloudrun-env.yaml
      - --set-secrets=SUPABASE_URL=supabase-url:latest,SUPABASE_ANON_KEY=supabase-anon-key:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,VAPID_PUBLIC_KEY=vapid-public-key:latest,VAPID_PRIVATE_KEY=vapid-private-key:latest,CEREBRAS_API_KEY=cerebras-api-key:latest,GROQ_API_KEY=groq-api-key:latest

images:
  - $_IMAGE

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _IMAGE: us-central1-docker.pkg.dev/propos-489401/propos/api:latest
  _REGION: us-central1
